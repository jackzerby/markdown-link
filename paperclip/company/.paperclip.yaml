schema: paperclip/v1
agents:
  ceo:
    role: ceo
    adapter:
      type: claude_local
      config:
        cwd: /Users/jackzerby/Sites/markdown-link
        model: claude-opus-4-6
        effort: high
        maxTurnsPerRun: 120
        dangerouslySkipPermissions: true
    runtime:
      heartbeat:
        intervalSec: 300
        cooldownSec: 30
        wakeOnOnDemand: true
        wakeOnAssignment: true
        wakeOnAutomation: true
        maxConcurrentRuns: 1
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: optional
